<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="./images/logo.ico">
  <title>Dublin Cuisine Tour</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
  <a href="homepage.html" class="site-logo">
    <img src="images/logo.png" alt="Dublin Cuisine Tour logo">
  </a>
    <div class="page-navigation">
      <!--
        Two destinations only: browse routes or learn who we are.
        Keeping the nav minimal avoids overwhelming first-time visitors
        who haven't yet committed to a route.
      -->
      <a href="discover.html">Routes</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <section id="landing">
    <!--
      The h1 is the brand statement and the product description in one.
      "Dublin's First" establishes novelty; "Multinational Cuisine Tour"
      does the SEO and category work. Line breaks are intentional so
      each line lands as its own beat on mobile.
    -->
    <h1>Dublin's First<br>Multinational<br>Cuisine Tour</h1>
    <p class="tour-tagline">Eat the world, one street at a time</p>
    <div class="tour-entry-actions">
      <!--
        Discover is the primary action as it leads to the routes where
        the actual value of the service lives. About is secondary,
        for visitors who need trust-building before they commit.
      -->
      <a href="discover.html" class="action-discover">Discover</a>
      <a href="about.html" class="action-about">About</a>
    </div>
  </section>

  <footer>
    <p>Dublin Cuisine Tour · Dublin, Ireland</p>
    <p>2025 · All rights reserved</p>
  </footer>

</body>
</html>
