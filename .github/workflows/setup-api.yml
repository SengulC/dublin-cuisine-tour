name: CI Pipeline
#source: https://www.c-sharpcorner.com/article/how-do-i-secure-api-keys-when-using-github-actions-and-cicd-pipelines/

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Building project with secure API key"
